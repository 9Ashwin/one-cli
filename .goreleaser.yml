version: 2

builds:
  - binary: onecli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/9Ashwin/one-cli/internal/build.Version={{ .Version }} -X github.com/9Ashwin/one-cli/internal/build.Date={{ .Date }}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - name_template: "onecli-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
